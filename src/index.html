<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div
      class="container bg-red-300 mx-auto p-4 my-4 text-red-900 border-red-600 border-2"
    >
      <p>O texto do container</p>
    </div>

    <!-- Exercício 01
        Criar um container de cor de fundo verde, que ao atingir > de 768px, o fundo dev ficar azul
    -->

    <div class="container bg-green-500 mx-auto p-4 my-4 md:bg-blue-500">
      <p>Exercício 01</p>
    </div>

    <!-- border-gox & border-content -->
    <div
      class="container bg-yellow-300 mx-auto p-10 m-4 border-2 border-yellow-600 box-border"
    >
      <p>Border Box</p>
    </div>

    <div
      class="container bg-purple-300 mx-auto p-10 m-4 border-2 border-purple-600 box-content"
    >
      <p>Border Content</p>
    </div>

    <!-- Display -->
    <div class="container p-10 mx-auto border-2 border-gray-600 my-4">
      <div class="bg-blue-400">Elemento de bloco</div>
    </div>

    <div class="container p-10 mx-auto border-2 border-gray-600 my-4">
      <div class="bg-blue-400 inline-block">Elemento de bloco</div>
      <div class="bg-blue-400 inline-block">Elemento de bloco</div>
      <div class="bg-green-400 hidden">Elemento de bloco</div>
    </div>

    <!-- Exercício 02
      Criar um container com 3 divs, cada uma com uma cor diferente, as divis devem ficar numa única linha
    -->

    <div class="container p-10 mx-auto border-2 border-gray-600 my-4">
      <div class="bg-green-400 inline-block">Elemento de bloco</div>
      <div class="bg-red-400 inline-block">Elemento de bloco</div>
      <div class="bg-blue-400 inline-block">Elemento de bloco</div>
    </div>
  </body>
</html>
